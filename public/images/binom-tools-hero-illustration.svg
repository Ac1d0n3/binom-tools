<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800">
  <defs>
    <linearGradient id="binom-hero-card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f5f5f5"/>
    </linearGradient>
    <linearGradient id="binom-hero-code-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#eef2ff"/>
    </linearGradient>
    <filter id="binom-hero-shadow">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-opacity="0.25"/>
    </filter>
    <style>
      .binom-hero-illus__primary-fill { fill: var(--hero-illus-primary, #2e6f91); }
      .binom-hero-illus__accent-fill { fill: var(--hero-illus-accent, #3fa9c9); }
      .binom-hero-illus__chip-accent {
        fill: #222734;
        stroke: var(--hero-illus-accent, #3fa9c9);
        stroke-width: 2;
      }
      .binom-hero-illus__chip-accent-light {
        fill: #ffffff;
        stroke: var(--hero-illus-accent, #3fa9c9);
        stroke-width: 2;
      }
      .binom-hero-illus__chip-surface {
        fill: #2a2f3b;
        stroke: var(--hero-illus-accent, #3fa9c9);
        stroke-width: 1.5;
        stroke-opacity: 0.55;
      }
      .binom-hero-illus__chip-label {
        font-family: Arial, Helvetica, sans-serif;
        text-anchor: middle;
        dominant-baseline: central;
      }
      .binom-hero-illus__code-icon {
        font-family: ui-monospace, "Cascadia Code", "SF Mono", Consolas, monospace;
        font-weight: 700;
        text-anchor: middle;
        dominant-baseline: central;
      }
    </style>
  </defs>

  <g transform="translate(560 120) rotate(8)" filter="url(#binom-hero-shadow)">
    <rect x="0" y="0" width="360" height="470" rx="28" fill="url(#binom-hero-card)"/>
    <rect x="28" y="28" width="160" height="16" rx="8" fill="#d9d9d9"/>
    <circle cx="300" cy="36" r="8" fill="#cfcfcf"/>
    <rect x="55" y="105" width="250" height="170" rx="18" fill="url(#binom-hero-code-bg)" stroke="#e2e8f0"/>
    <text x="180" y="190" font-size="64" class="binom-hero-illus__code-icon binom-hero-illus__primary-fill">&lt;/&gt;</text>
    <rect x="90" y="315" width="180" height="12" rx="6" fill="#dddddd"/>
    <rect x="120" y="340" width="120" height="12" rx="6" fill="#dddddd"/>
  </g>

  <g filter="url(#binom-hero-shadow)">
    <rect x="450" y="130" width="240" height="90" rx="18" class="binom-hero-illus__chip-accent"/>
    <text x="570" y="175" class="binom-hero-illus__chip-label binom-hero-illus__accent-fill" font-size="18">PII Policies</text>
  </g>

  <g filter="url(#binom-hero-shadow)">
    <rect x="420" y="275" width="170" height="90" rx="18" class="binom-hero-illus__chip-surface"/>
    <text x="505" y="320" class="binom-hero-illus__chip-label" fill="#ffffff" font-size="20">
      <tspan>⚡</tspan><tspan dx="10">SDK-Ready</tspan>
    </text>
  </g>

  <g filter="url(#binom-hero-shadow)">
    <rect x="390" y="465" width="220" height="110" rx="18" fill="#3a3f49" stroke="var(--hero-illus-accent, #3fa9c9)" stroke-width="1.5" stroke-opacity="0.45"/>
    <text x="500" y="512" class="binom-hero-illus__chip-label" fill="#ffffff" font-size="22">dbt</text>
    <text x="500" y="542" class="binom-hero-illus__chip-label binom-hero-illus__accent-fill" font-size="18">schema.yml</text>
  </g>

  <g filter="url(#binom-hero-shadow)">
    <rect x="790" y="265" width="200" height="90" rx="18" class="binom-hero-illus__chip-surface"/>
    <text x="890" y="310" class="binom-hero-illus__chip-label binom-hero-illus__accent-fill" font-size="20">AI Sanitizer</text>
  </g>

  <g filter="url(#binom-hero-shadow)">
    <rect x="750" y="490" width="260" height="110" rx="18" fill="#2d323d" stroke="var(--hero-illus-accent, #3fa9c9)" stroke-width="1.5" stroke-opacity="0.4"/>
    <text x="880" y="545" class="binom-hero-illus__chip-label" fill="#ffffff" font-size="20">Data Governance</text>
  </g>

  <g filter="url(#binom-hero-shadow)">
    <rect x="770" y="140" width="200" height="80" rx="18" class="binom-hero-illus__chip-accent-light"/>
    <text x="870" y="180" class="binom-hero-illus__chip-label binom-hero-illus__accent-fill" font-size="18">BI Workflows</text>
  </g>
</svg>
